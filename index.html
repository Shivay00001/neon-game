<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Beat Dash - Rhythm Runner Game</title>
    <meta name="description" content="A hyper-addictive rhythm runner game">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a1f 0%, #1a0a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            max-width: 100vw;
            max-height: 100vh;
        }

        canvas {
            display: block;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.5);
            border-radius: 8px;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #8a2be2;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #8a2be2;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <div class="loading">Loading Neon Beat Dash...</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>

</html>
